<!DOCTYPE html>
<html lang="en">

<head>
	<title>ToDo List</title>
	<meta charset="UTF-8">
	<meta name="format-detection" content="telephone=no">
	<!-- <style>body{opacity: 0;}</style> -->
	<link rel="stylesheet" href="css/style.min.css?_v=20230425093158">
	<link rel="shortcut icon" href="favicon.ico">
	<!-- <meta name="robots" content="noindex, nofollow"> -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
	<div class="wrapper">
		<main class="page">
			<h1 class="page__title">TODO</h1>
			<div class="page__container">
				<div class="page__input input-page">
					<input type="text" placeholder="Create a new todo..." class="input-page__input" />
					<button type="button" class="input-page__button"></button>
				</div>
				<div class="page__list list-page">
					<ul class="list-page__body"></ul>
					<div class="list-page__footer footer-list">
						<div class="footer-list__total"><span>0</span>Items</div>
						<button type="button" class="footer-list__button">Clear Complete</button>
					</div>
				</div>
			</div>
		</main>
	</div>
	<script src="js/app.min.js?_v=20230425093158"></script>
</body>

</html>
